server:
  port: 8082

spring:
  application:
    name: step2-custom-auth

  # H2 Database 설정 (교육용)
  datasource:
    url: jdbc:h2:mem:securitydb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # schema.sql, data.sql 자동 실행
  sql:
    init:
      mode: always

# ==============================================
# [Step 2] Custom AuthenticationProvider + JDBC 인증
# ==============================================
# 13:00~15:00: AuthenticationManager & Provider
# - 커스텀 AuthenticationProvider (휴면계정/비밀번호 오류 횟수 체크)
# - ProviderManager의 다중 Provider 순회
# 15:00~17:00: JDBC 인증
# - H2 Database + JPA
# - UserDetailsService 커스텀 구현
# ==============================================

logging:
  level:
    org.springframework.security: TRACE
    com.security.training.step2: DEBUG
    org.hibernate.SQL: DEBUG
